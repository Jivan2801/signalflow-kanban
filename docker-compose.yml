version: '3.8'

services:
  backend:
    build:
      context: ./backend/Kanban.API
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - backend-db:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/kanban.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000

volumes:
  backend-db:
